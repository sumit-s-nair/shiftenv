spec_version: 1
name: shiftenv
description: >
  An RL environment where an agent migrates Python repositories from
  deprecated/outdated libraries to modern replacements. The agent uses tools
  to understand codebases and make targeted edits, guided by a reward signal
  from the test suite.
type: code
version: "0.1.0"

tasks:
  easy:
    description: "Migrate crypto utilities from random to secrets"
    difficulty: easy
    grader: "graders.easy_grader"
  medium:
    description: "Migrate HTTP client from requests to httpx"
    difficulty: medium
    grader: "graders.medium_grader"
  hard:
    description: "Migrate test suite from unittest to pytest"
    difficulty: hard
    grader: "graders.hard_grader"

environment:
  entry_point: inference.py
  timeout_minutes: 20
  max_steps: 10

env_vars:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN
  - OPENENV_TASK
